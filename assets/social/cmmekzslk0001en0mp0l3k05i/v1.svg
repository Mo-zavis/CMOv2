<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <!-- Water ripple pattern -->
    <pattern id="waterPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="100" cy="100" r="80" fill="none" stroke="#006828" stroke-width="0.3" opacity="0.05"/>
      <circle cx="100" cy="100" r="60" fill="none" stroke="#006828" stroke-width="0.3" opacity="0.06"/>
      <circle cx="100" cy="100" r="40" fill="none" stroke="#006828" stroke-width="0.3" opacity="0.07"/>
      <circle cx="100" cy="100" r="20" fill="none" stroke="#006828" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <linearGradient id="waterDrop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#006828;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#006828;stop-opacity:0.05"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="35%" r="40%">
      <stop offset="0%" style="stop-color:#006828;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#006828;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="#f8f8f6"/>
  <rect width="1080" height="1350" fill="url(#waterPattern)"/>
  <rect width="1080" height="1350" fill="url(#glowCenter)"/>

  <!-- Top decorative band -->
  <rect x="0" y="0" width="1080" height="6" fill="#006828"/>

  <!-- Label badge -->
  <rect x="80" y="60" width="320" height="44" rx="22" fill="#006828" opacity="0.1"/>
  <text x="240" y="90" text-anchor="middle" font-family="'Geist', sans-serif" font-size="18" fill="#006828" font-weight="600" letter-spacing="2">RAMADAN WELLNESS</text>

  <!-- Large water drop icon -->
  <g transform="translate(540, 280)">
    <!-- Outer drop shape -->
    <path d="M0,-120 C-5,-110 -70,-30 -70,30 A70,70 0 1,0 70,30 C70,-30 5,-110 0,-120Z" fill="url(#waterDrop)" stroke="#006828" stroke-width="2" opacity="0.8"/>
    <!-- Inner highlight -->
    <ellipse cx="-15" cy="10" rx="20" ry="30" fill="#006828" opacity="0.06" transform="rotate(-15)"/>
    <!-- Healthcare cross inside drop -->
    <rect x="-6" y="-20" width="12" height="40" rx="3" fill="#006828" opacity="0.6"/>
    <rect x="-20" y="-6" width="40" height="12" rx="3" fill="#006828" opacity="0.6"/>
    <!-- Crescent accent at top -->
    <g transform="translate(50, -80)" opacity="0.5">
      <path d="M0,-15 A15,15 0 1,1 0,15 A11,11 0 1,0 0,-15" fill="#006828"/>
    </g>
  </g>

  <!-- Main heading -->
  <text x="540" y="470" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="72" font-weight="700" fill="#1c1c1c" letter-spacing="-1">Hydration Tips</text>
  <text x="540" y="530" text-anchor="middle" font-family="'Geist', sans-serif" font-size="30" fill="#1c1c1c" opacity="0.5">for Fasting Patients</text>

  <!-- Decorative divider -->
  <line x1="420" y1="570" x2="660" y2="570" stroke="#006828" stroke-width="1.5" opacity="0.3"/>

  <!-- Tip cards -->
  <!-- Tip 1 -->
  <g transform="translate(80, 610)">
    <rect x="0" y="0" width="440" height="150" rx="16" fill="#ffffff" stroke="#ecebe8" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="28" fill="#006828" opacity="0.1"/>
    <!-- Glass icon -->
    <rect x="38" y="32" width="24" height="30" rx="3" fill="none" stroke="#006828" stroke-width="2"/>
    <line x1="42" y1="48" x2="58" y2="48" stroke="#006828" stroke-width="1.5" opacity="0.4"/>
    <text x="100" y="50" font-family="'Bricolage Grotesque', sans-serif" font-size="24" font-weight="600" fill="#1c1c1c">Drink Gradually at Iftar</text>
    <text x="100" y="80" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">Sip water slowly. Avoid gulping</text>
    <text x="100" y="105" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">large amounts at once.</text>
  </g>

  <!-- Tip 2 -->
  <g transform="translate(560, 610)">
    <rect x="0" y="0" width="440" height="150" rx="16" fill="#ffffff" stroke="#ecebe8" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="28" fill="#006828" opacity="0.1"/>
    <!-- Moon icon -->
    <path d="M42,35 A18,18 0 1,1 42,65 A14,14 0 1,0 42,35" fill="none" stroke="#006828" stroke-width="2"/>
    <text x="100" y="50" font-family="'Bricolage Grotesque', sans-serif" font-size="24" font-weight="600" fill="#1c1c1c">Hydrate at Suhoor</text>
    <text x="100" y="80" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">Drink 2-3 glasses before the</text>
    <text x="100" y="105" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">fast begins each morning.</text>
  </g>

  <!-- Tip 3 -->
  <g transform="translate(80, 790)">
    <rect x="0" y="0" width="440" height="150" rx="16" fill="#ffffff" stroke="#ecebe8" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="28" fill="#006828" opacity="0.1"/>
    <!-- Fruit icon (circle with leaf) -->
    <circle cx="50" cy="52" r="14" fill="none" stroke="#006828" stroke-width="2"/>
    <path d="M50,38 Q56,30 62,35" fill="none" stroke="#006828" stroke-width="1.5"/>
    <text x="100" y="50" font-family="'Bricolage Grotesque', sans-serif" font-size="24" font-weight="600" fill="#1c1c1c">Eat Water-Rich Foods</text>
    <text x="100" y="80" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">Watermelon, cucumbers, and soups</text>
    <text x="100" y="105" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">help maintain fluid balance.</text>
  </g>

  <!-- Tip 4 -->
  <g transform="translate(560, 790)">
    <rect x="0" y="0" width="440" height="150" rx="16" fill="#ffffff" stroke="#ecebe8" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="28" fill="#006828" opacity="0.1"/>
    <!-- No caffeine icon (cup with X) -->
    <rect x="38" y="36" width="24" height="22" rx="3" fill="none" stroke="#006828" stroke-width="2"/>
    <path d="M62,40 Q70,45 62,54" fill="none" stroke="#006828" stroke-width="1.5"/>
    <line x1="43" y1="40" x2="57" y2="54" stroke="#006828" stroke-width="1.5" opacity="0.6"/>
    <text x="100" y="50" font-family="'Bricolage Grotesque', sans-serif" font-size="24" font-weight="600" fill="#1c1c1c">Limit Caffeine</text>
    <text x="100" y="80" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">Caffeine is a diuretic. Choose</text>
    <text x="100" y="105" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">herbal teas or warm water instead.</text>
  </g>

  <!-- Tip 5 -->
  <g transform="translate(80, 970)">
    <rect x="0" y="0" width="440" height="150" rx="16" fill="#ffffff" stroke="#ecebe8" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="28" fill="#006828" opacity="0.1"/>
    <!-- Warning/alert icon -->
    <polygon points="50,32 68,65 32,65" fill="none" stroke="#006828" stroke-width="2"/>
    <line x1="50" y1="44" x2="50" y2="54" stroke="#006828" stroke-width="2"/>
    <circle cx="50" cy="59" r="2" fill="#006828"/>
    <text x="100" y="50" font-family="'Bricolage Grotesque', sans-serif" font-size="24" font-weight="600" fill="#1c1c1c">Watch for Warning Signs</text>
    <text x="100" y="80" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">Dizziness, dark urine, or headaches</text>
    <text x="100" y="105" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">may indicate dehydration. Seek help.</text>
  </g>

  <!-- Tip 6 -->
  <g transform="translate(560, 970)">
    <rect x="0" y="0" width="440" height="150" rx="16" fill="#ffffff" stroke="#ecebe8" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="28" fill="#006828" opacity="0.1"/>
    <!-- Clock icon -->
    <circle cx="50" cy="50" r="16" fill="none" stroke="#006828" stroke-width="2"/>
    <line x1="50" y1="50" x2="50" y2="40" stroke="#006828" stroke-width="2"/>
    <line x1="50" y1="50" x2="58" y2="54" stroke="#006828" stroke-width="1.5"/>
    <text x="100" y="50" font-family="'Bricolage Grotesque', sans-serif" font-size="24" font-weight="600" fill="#1c1c1c">Set Hydration Reminders</text>
    <text x="100" y="80" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">Use Zavis to send automated</text>
    <text x="100" y="105" font-family="'Geist', sans-serif" font-size="19" fill="#1c1c1c" opacity="0.55">hydration prompts between meals.</text>
  </g>

  <!-- Zavis branding footer -->
  <rect x="0" y="1250" width="1080" height="100" fill="#006828"/>
  <text x="540" y="1310" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="38" font-weight="700" fill="#f8f8f6" letter-spacing="6">ZAVIS</text>
  <text x="540" y="1338" text-anchor="middle" font-family="'Geist', sans-serif" font-size="14" fill="#f8f8f6" opacity="0.7" letter-spacing="3">AI-POWERED PATIENT ENGAGEMENT</text>
</svg>