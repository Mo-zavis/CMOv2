<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <!-- Star tessellation pattern -->
    <pattern id="starTessellation" x="0" y="0" width="140" height="140" patternUnits="userSpaceOnUse">
      <rect width="140" height="140" fill="none"/>
      <!-- 6-point star -->
      <polygon points="70,10 82,45 120,45 90,65 100,100 70,80 40,100 50,65 20,45 58,45" fill="none" stroke="#006828" stroke-width="0.5" opacity="0.06"/>
      <!-- Connecting lines -->
      <line x1="0" y1="70" x2="20" y2="45" stroke="#006828" stroke-width="0.3" opacity="0.04"/>
      <line x1="140" y1="70" x2="120" y2="45" stroke="#006828" stroke-width="0.3" opacity="0.04"/>
      <line x1="70" y1="0" x2="70" y2="10" stroke="#006828" stroke-width="0.3" opacity="0.04"/>
      <line x1="70" y1="140" x2="70" y2="100" stroke="#006828" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <radialGradient id="featureGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#006828;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#006828;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="#f8f8f6"/>
  <rect width="1080" height="1350" fill="url(#starTessellation)"/>
  <rect width="1080" height="1350" fill="url(#featureGlow)"/>

  <!-- Green header section -->
  <rect x="0" y="0" width="1080" height="320" fill="#006828"/>

  <!-- Decorative Islamic arch in header -->
  <g opacity="0.1">
    <path d="M340,320 L340,180 A200,200 0 0,1 740,180 L740,320" fill="none" stroke="#f8f8f6" stroke-width="2"/>
    <path d="M380,320 L380,200 A160,160 0 0,1 700,200 L700,320" fill="none" stroke="#f8f8f6" stroke-width="1.5"/>
    <!-- Small crescent in arch -->
    <path d="M520,160 A30,30 0 1,1 520,220 A22,22 0 1,0 520,160" fill="#f8f8f6" opacity="0.5"/>
    <circle cx="565" cy="155" r="4" fill="#f8f8f6" opacity="0.4"/>
  </g>

  <!-- Header text -->
  <text x="540" y="100" text-anchor="middle" font-family="'Geist', sans-serif" font-size="22" fill="#f8f8f6" opacity="0.6" letter-spacing="4">THIS RAMADAN</text>
  <text x="540" y="175" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="64" font-weight="700" fill="#f8f8f6">Zavis Powers</text>
  <text x="540" y="250" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="64" font-weight="700" fill="#f8f8f6">Compassionate Care</text>

  <!-- Feature grid - 3x2 -->
  <!-- Feature 1: Smart Reminders -->
  <g transform="translate(80, 380)">
    <rect x="0" y="0" width="460" height="200" rx="20" fill="#ffffff" stroke="#ecebe8" stroke-width="1"/>
    <!-- Bell icon -->
    <g transform="translate(40, 40)">
      <circle cx="30" cy="30" r="30" fill="#006828" opacity="0.08"/>
      <path d="M22,22 Q22,12 30,12 Q38,12 38,22 L40,35 L20,35Z" fill="none" stroke="#006828" stroke-width="2"/>
      <line x1="22" y1="35" x2="38" y2="35" stroke="#006828" stroke-width="2"/>
      <circle cx="30" cy="40" r="3" fill="#006828" opacity="0.6"/>
    </g>
    <text x="110" y="60" font-family="'Bricolage Grotesque', sans-serif" font-size="26" font-weight="600" fill="#1c1c1c">Smart Reminders</text>
    <text x="110" y="92" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">Culturally-timed notifications</text>
    <text x="110" y="118" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">that respect fasting hours</text>
    <!-- Pillar badge -->
    <rect x="20" y="150" width="200" height="30" rx="15" fill="#006828" opacity="0.08"/>
    <text x="120" y="170" text-anchor="middle" font-family="'Geist', sans-serif" font-size="14" fill="#006828" font-weight="600">Reduce No-Shows</text>
  </g>

  <!-- Feature 2: Flexible Scheduling -->
  <g transform="translate(560, 380)">
    <rect x="0" y="0" width="460" height="200" rx="20" fill="#ffffff" stroke="#ecebe8" stroke-width="1"/>
    <!-- Calendar icon -->
    <g transform="translate(40, 40)">
      <circle cx="30" cy="30" r="30" fill="#006828" opacity="0.08"/>
      <rect x="16" y="18" width="28" height="24" rx="3" fill="none" stroke="#006828" stroke-width="2"/>
      <line x1="16" y1="26" x2="44" y2="26" stroke="#006828" stroke-width="1.5"/>
      <line x1="24" y1="14" x2="24" y2="20" stroke="#006828" stroke-width="2"/>
      <line x1="36" y1="14" x2="36" y2="20" stroke="#006828" stroke-width="2"/>
    </g>
    <text x="110" y="60" font-family="'Bricolage Grotesque', sans-serif" font-size="26" font-weight="600" fill="#1c1c1c">Flexible Scheduling</text>
    <text x="110" y="92" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">Auto-adjust available slots for</text>
    <text x="110" y="118" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">Ramadan-optimized hours</text>
    <rect x="20" y="150" width="200" height="30" rx="15" fill="#006828" opacity="0.08"/>
    <text x="120" y="170" text-anchor="middle" font-family="'Geist', sans-serif" font-size="14" fill="#006828" font-weight="600">Patient Satisfaction</text>
  </g>

  <!-- Feature 3: Multilingual Comms -->
  <g transform="translate(80, 610)">
    <rect x="0" y="0" width="460" height="200" rx="20" fill="#ffffff" stroke="#ecebe8" stroke-width="1"/>
    <!-- Chat bubble icon -->
    <g transform="translate(40, 40)">
      <circle cx="30" cy="30" r="30" fill="#006828" opacity="0.08"/>
      <rect x="14" y="16" width="32" height="22" rx="6" fill="none" stroke="#006828" stroke-width="2"/>
      <polygon points="22,38 28,38 20,48" fill="none" stroke="#006828" stroke-width="2" stroke-linejoin="round"/>
      <line x1="22" y1="24" x2="38" y2="24" stroke="#006828" stroke-width="1.5" opacity="0.5"/>
      <line x1="22" y1="30" x2="34" y2="30" stroke="#006828" stroke-width="1.5" opacity="0.5"/>
    </g>
    <text x="110" y="60" font-family="'Bricolage Grotesque', sans-serif" font-size="26" font-weight="600" fill="#1c1c1c">Multilingual Outreach</text>
    <text x="110" y="92" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">Engage patients in Arabic, Urdu,</text>
    <text x="110" y="118" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">and more with AI translation</text>
    <rect x="20" y="150" width="200" height="30" rx="15" fill="#006828" opacity="0.08"/>
    <text x="120" y="170" text-anchor="middle" font-family="'Geist', sans-serif" font-size="14" fill="#006828" font-weight="600">Patient Satisfaction</text>
  </g>

  <!-- Feature 4: Health Insights -->
  <g transform="translate(560, 610)">
    <rect x="0" y="0" width="460" height="200" rx="20" fill="#ffffff" stroke="#ecebe8" stroke-width="1"/>
    <!-- Chart icon -->
    <g transform="translate(40, 40)">
      <circle cx="30" cy="30" r="30" fill="#006828" opacity="0.08"/>
      <line x1="16" y1="42" x2="16" y2="18" stroke="#006828" stroke-width="2"/>
      <line x1="16" y1="42" x2="44" y2="42" stroke="#006828" stroke-width="2"/>
      <rect x="20" y="30" width="6" height="12" fill="#006828" opacity="0.6"/>
      <rect x="28" y="22" width="6" height="20" fill="#006828" opacity="0.6"/>
      <rect x="36" y="26" width="6" height="16" fill="#006828" opacity="0.6"/>
    </g>
    <text x="110" y="60" font-family="'Bricolage Grotesque', sans-serif" font-size="26" font-weight="600" fill="#1c1c1c">Health Analytics</text>
    <text x="110" y="92" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">Track patient engagement and</text>
    <text x="110" y="118" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">wellness trends during Ramadan</text>
    <rect x="20" y="150" width="200" height="30" rx="15" fill="#006828" opacity="0.08"/>
    <text x="120" y="170" text-anchor="middle" font-family="'Geist', sans-serif" font-size="14" fill="#006828" font-weight="600">Increase Revenue</text>
  </g>

  <!-- Feature 5: Automated Follow-ups -->
  <g transform="translate(80, 840)">
    <rect x="0" y="0" width="460" height="200" rx="20" fill="#ffffff" stroke="#ecebe8" stroke-width="1"/>
    <!-- Refresh/sync icon -->
    <g transform="translate(40, 40)">
      <circle cx="30" cy="30" r="30" fill="#006828" opacity="0.08"/>
      <path d="M20,30 A12,12 0 0,1 40,30" fill="none" stroke="#006828" stroke-width="2"/>
      <polygon points="40,26 40,34 46,30" fill="#006828"/>
      <path d="M40,32 A12,12 0 0,1 20,32" fill="none" stroke="#006828" stroke-width="2"/>
      <polygon points="20,36 20,28 14,32" fill="#006828"/>
    </g>
    <text x="110" y="60" font-family="'Bricolage Grotesque', sans-serif" font-size="26" font-weight="600" fill="#1c1c1c">Automated Follow-ups</text>
    <text x="110" y="92" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">AI-driven post-visit check-ins</text>
    <text x="110" y="118" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">tailored to fasting patients</text>
    <rect x="20" y="150" width="200" height="30" rx="15" fill="#006828" opacity="0.08"/>
    <text x="120" y="170" text-anchor="middle" font-family="'Geist', sans-serif" font-size="14" fill="#006828" font-weight="600">Reduce No-Shows</text>
  </g>

  <!-- Feature 6: Telehealth -->
  <g transform="translate(560, 840)">
    <rect x="0" y="0" width="460" height="200" rx="20" fill="#ffffff" stroke="#ecebe8" stroke-width="1"/>
    <!-- Video/monitor icon -->
    <g transform="translate(40, 40)">
      <circle cx="30" cy="30" r="30" fill="#006828" opacity="0.08"/>
      <rect x="14" y="18" width="26" height="20" rx="3" fill="none" stroke="#006828" stroke-width="2"/>
      <polygon points="42,22 52,18 52,38 42,34" fill="none" stroke="#006828" stroke-width="2" stroke-linejoin="round"/>
    </g>
    <text x="110" y="60" font-family="'Bricolage Grotesque', sans-serif" font-size="26" font-weight="600" fill="#1c1c1c">Telehealth Ready</text>
    <text x="110" y="92" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">Virtual consultations that fit</text>
    <text x="110" y="118" font-family="'Geist', sans-serif" font-size="20" fill="#1c1c1c" opacity="0.55">around Ramadan routines</text>
    <rect x="20" y="150" width="200" height="30" rx="15" fill="#006828" opacity="0.08"/>
    <text x="120" y="170" text-anchor="middle" font-family="'Geist', sans-serif" font-size="14" fill="#006828" font-weight="600">Increase Revenue</text>
  </g>

  <!-- CTA -->
  <rect x="300" y="1100" width="480" height="64" rx="32" fill="#006828"/>
  <text x="540" y="1142" text-anchor="middle" font-family="'Geist', sans-serif" font-size="24" fill="#f8f8f6" font-weight="600" letter-spacing="1">Book a Demo at zavis.ai</text>

  <!-- Zavis branding footer -->
  <rect x="0" y="1250" width="1080" height="100" fill="#006828"/>
  <text x="540" y="1310" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="38" font-weight="700" fill="#f8f8f6" letter-spacing="6">ZAVIS</text>
  <text x="540" y="1338" text-anchor="middle" font-family="'Geist', sans-serif" font-size="14" fill="#f8f8f6" opacity="0.7" letter-spacing="3">AI-POWERED PATIENT ENGAGEMENT</text>
</svg>