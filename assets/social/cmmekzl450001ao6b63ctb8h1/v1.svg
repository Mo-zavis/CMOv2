<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <!-- Arabesque pattern -->
    <pattern id="arabesquePattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="none"/>
      <path d="M50,0 Q75,25 50,50 Q25,75 50,100" fill="none" stroke="#006828" stroke-width="0.5" opacity="0.07"/>
      <path d="M0,50 Q25,25 50,50 Q75,75 100,50" fill="none" stroke="#006828" stroke-width="0.5" opacity="0.07"/>
      <circle cx="50" cy="50" r="3" fill="#006828" opacity="0.04"/>
      <circle cx="0" cy="0" r="3" fill="#006828" opacity="0.04"/>
      <circle cx="100" cy="0" r="3" fill="#006828" opacity="0.04"/>
      <circle cx="0" cy="100" r="3" fill="#006828" opacity="0.04"/>
      <circle cx="100" cy="100" r="3" fill="#006828" opacity="0.04"/>
    </pattern>
    <linearGradient id="quoteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#006828;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#006828;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="#f8f8f6"/>
  <rect width="1080" height="1350" fill="url(#arabesquePattern)"/>

  <!-- Top accent strip -->
  <rect x="0" y="0" width="1080" height="8" fill="#006828"/>

  <!-- Label -->
  <rect x="80" y="80" width="280" height="44" rx="22" fill="#006828" opacity="0.1"/>
  <text x="220" y="110" text-anchor="middle" font-family="'Geist', sans-serif" font-size="18" fill="#006828" font-weight="600" letter-spacing="2">RAMADAN INSIGHTS</text>

  <!-- Decorative Islamic geometric frame -->
  <g opacity="0.12">
    <!-- Corner ornaments -->
    <!-- Top left -->
    <g transform="translate(60, 160)">
      <polygon points="0,0 30,-15 60,0 45,30 60,60 30,45 0,60 15,30" fill="none" stroke="#006828" stroke-width="1.5"/>
    </g>
    <!-- Top right -->
    <g transform="translate(960, 160)">
      <polygon points="0,0 30,-15 60,0 45,30 60,60 30,45 0,60 15,30" fill="none" stroke="#006828" stroke-width="1.5"/>
    </g>
    <!-- Connecting line top -->
    <line x1="130" y1="190" x2="950" y2="190" stroke="#006828" stroke-width="1"/>
    <!-- Side lines -->
    <line x1="80" y1="230" x2="80" y2="1020" stroke="#006828" stroke-width="1"/>
    <line x1="1000" y1="230" x2="1000" y2="1020" stroke="#006828" stroke-width="1"/>
    <!-- Bottom left -->
    <g transform="translate(60, 1000)">
      <polygon points="0,0 30,-15 60,0 45,30 60,60 30,45 0,60 15,30" fill="none" stroke="#006828" stroke-width="1.5"/>
    </g>
    <!-- Bottom right -->
    <g transform="translate(960, 1000)">
      <polygon points="0,0 30,-15 60,0 45,30 60,60 30,45 0,60 15,30" fill="none" stroke="#006828" stroke-width="1.5"/>
    </g>
    <!-- Connecting line bottom -->
    <line x1="130" y1="1030" x2="950" y2="1030" stroke="#006828" stroke-width="1"/>
  </g>

  <!-- Large quotation mark -->
  <text x="140" y="400" font-family="Georgia, serif" font-size="300" fill="#006828" opacity="0.08">"</text>

  <!-- Main heading -->
  <text x="540" y="340" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="64" font-weight="700" fill="#1c1c1c" letter-spacing="-1">Cultural Sensitivity</text>
  <text x="540" y="420" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="64" font-weight="700" fill="#006828" letter-spacing="-1">Builds Trust</text>

  <!-- Decorative divider -->
  <g transform="translate(540, 480)" opacity="0.3">
    <line x1="-120" y1="0" x2="-20" y2="0" stroke="#006828" stroke-width="1.5"/>
    <polygon points="0,-8 8,0 0,8 -8,0" fill="#006828"/>
    <line x1="20" y1="0" x2="120" y2="0" stroke="#006828" stroke-width="1.5"/>
  </g>

  <!-- Testimonial quote -->
  <text x="540" y="570" text-anchor="middle" font-family="'Geist', sans-serif" font-size="32" fill="#1c1c1c" opacity="0.75" font-style="italic">"When my clinic started sending Ramadan-</text>
  <text x="540" y="615" text-anchor="middle" font-family="'Geist', sans-serif" font-size="32" fill="#1c1c1c" opacity="0.75" font-style="italic">aware appointment reminders, our patients</text>
  <text x="540" y="660" text-anchor="middle" font-family="'Geist', sans-serif" font-size="32" fill="#1c1c1c" opacity="0.75" font-style="italic">felt seen and respected. No-show rates</text>
  <text x="540" y="705" text-anchor="middle" font-family="'Geist', sans-serif" font-size="32" fill="#1c1c1c" opacity="0.75" font-style="italic">dropped 34% in just one month."</text>

  <!-- Attribution -->
  <line x1="490" y1="770" x2="590" y2="770" stroke="#006828" stroke-width="2" opacity="0.4"/>
  <text x="540" y="820" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="28" font-weight="600" fill="#1c1c1c">Dr. Sarah Ahmad</text>
  <text x="540" y="860" text-anchor="middle" font-family="'Geist', sans-serif" font-size="22" fill="#1c1c1c" opacity="0.5">Family Medicine, Houston TX</text>

  <!-- Stats bar -->
  <rect x="120" y="940" width="840" height="100" rx="16" fill="#ecebe8"/>
  <g transform="translate(260, 940)">
    <text x="0" y="45" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="40" font-weight="700" fill="#006828">34%</text>
    <text x="0" y="75" text-anchor="middle" font-family="'Geist', sans-serif" font-size="18" fill="#1c1c1c" opacity="0.5">Fewer No-Shows</text>
  </g>
  <line x1="420" y1="960" x2="420" y2="1020" stroke="#1c1c1c" stroke-width="1" opacity="0.1"/>
  <g transform="translate(540, 940)">
    <text x="0" y="45" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="40" font-weight="700" fill="#006828">92%</text>
    <text x="0" y="75" text-anchor="middle" font-family="'Geist', sans-serif" font-size="18" fill="#1c1c1c" opacity="0.5">Patient Satisfaction</text>
  </g>
  <line x1="660" y1="960" x2="660" y2="1020" stroke="#1c1c1c" stroke-width="1" opacity="0.1"/>
  <g transform="translate(820, 940)">
    <text x="0" y="45" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="40" font-weight="700" fill="#006828">2x</text>
    <text x="0" y="75" text-anchor="middle" font-family="'Geist', sans-serif" font-size="18" fill="#1c1c1c" opacity="0.5">Rebooking Rate</text>
  </g>

  <!-- CTA -->
  <rect x="340" y="1100" width="400" height="64" rx="32" fill="#006828"/>
  <text x="540" y="1142" text-anchor="middle" font-family="'Geist', sans-serif" font-size="24" fill="#f8f8f6" font-weight="600" letter-spacing="1">Learn More at zavis.ai</text>

  <!-- Zavis branding footer -->
  <rect x="0" y="1250" width="1080" height="100" fill="#006828"/>
  <text x="540" y="1310" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="38" font-weight="700" fill="#f8f8f6" letter-spacing="6">ZAVIS</text>
  <text x="540" y="1338" text-anchor="middle" font-family="'Geist', sans-serif" font-size="14" fill="#f8f8f6" opacity="0.7" letter-spacing="3">AI-POWERED PATIENT ENGAGEMENT</text>
</svg>