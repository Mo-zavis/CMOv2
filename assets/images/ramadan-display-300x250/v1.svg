<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="300" height="250">
  <defs>
    <!-- Islamic geometric tile for medium rectangle -->
    <pattern id="medRectPattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="none"/>
      <polygon points="40,5 47,25 67,18 55,35 75,40 55,45 67,62 47,55 40,75 33,55 13,62 25,45 5,40 25,35 13,18 33,25" fill="none" stroke="#f8f8f6" stroke-width="0.3" opacity="0.08"/>
      <circle cx="40" cy="40" r="10" fill="none" stroke="#f8f8f6" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <linearGradient id="adGrad300" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#006828;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#004018;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="adGlow300" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#f8f8f6;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#f8f8f6;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="250" fill="url(#adGrad300)" rx="6"/>
  <rect width="300" height="250" fill="url(#medRectPattern)" rx="6"/>
  <rect width="300" height="250" fill="url(#adGlow300)" rx="6"/>

  <!-- Crescent moon and star -->
  <g transform="translate(150, 65)">
    <path d="M-10,-38 A38,38 0 1,1 -10,38 A28,28 0 1,0 -10,-38" fill="#f8f8f6" opacity="0.9"/>
    <polygon points="26,-26 29,-19 36,-19 31,-14 33,-7 26,-11 19,-7 21,-14 16,-19 23,-19" fill="#f8f8f6" opacity="0.7"/>
    <!-- Small stars -->
    <circle cx="-35" cy="-20" r="1.5" fill="#f8f8f6" opacity="0.4"/>
    <circle cx="40" cy="10" r="1" fill="#f8f8f6" opacity="0.3"/>
    <circle cx="-25" cy="30" r="1.2" fill="#f8f8f6" opacity="0.35"/>
  </g>

  <!-- Decorative arch at top -->
  <g opacity="0.08">
    <path d="M60,0 Q150,-30 240,0" fill="none" stroke="#f8f8f6" stroke-width="1"/>
  </g>

  <!-- Main heading -->
  <text x="150" y="138" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="20" font-weight="700" fill="#f8f8f6" letter-spacing="-0.3">Compassionate Care</text>
  <text x="150" y="160" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="20" font-weight="700" fill="#f8f8f6" letter-spacing="-0.3">This Ramadan</text>

  <!-- Subtext -->
  <text x="150" y="182" text-anchor="middle" font-family="'Geist', sans-serif" font-size="11" fill="#f8f8f6" opacity="0.7">AI-powered patient engagement that</text>
  <text x="150" y="196" text-anchor="middle" font-family="'Geist', sans-serif" font-size="11" fill="#f8f8f6" opacity="0.7">respects cultural needs.</text>

  <!-- CTA Button -->
  <rect x="85" y="208" width="130" height="32" rx="16" fill="#f8f8f6"/>
  <text x="150" y="229" text-anchor="middle" font-family="'Geist', sans-serif" font-size="13" font-weight="700" fill="#006828" letter-spacing="0.3">Book a Demo</text>

  <!-- Zavis wordmark -->
  <text x="260" y="244" text-anchor="end" font-family="'Bricolage Grotesque', sans-serif" font-size="10" font-weight="700" fill="#f8f8f6" opacity="0.45" letter-spacing="2">ZAVIS</text>

  <!-- Border -->
  <rect width="300" height="250" fill="none" stroke="#004018" stroke-width="1" rx="6"/>
</svg>