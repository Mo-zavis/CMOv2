<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 90" width="728" height="90">
  <defs>
    <!-- Subtle repeating pattern for leaderboard -->
    <pattern id="leaderboardPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <polygon points="30,5 35,20 50,15 40,27 52,35 40,33 35,48 30,35 25,48 20,33 8,35 20,27 10,15 25,20" fill="none" stroke="#f8f8f6" stroke-width="0.3" opacity="0.1"/>
    </pattern>
    <linearGradient id="adGrad728" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#006828;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#005020;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#004018;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="728" height="90" fill="url(#adGrad728)" rx="4"/>
  <rect width="728" height="90" fill="url(#leaderboardPattern)" rx="4"/>

  <!-- Left: Crescent moon + star accent -->
  <g transform="translate(50, 45)">
    <path d="M-8,-25 A25,25 0 1,1 -8,25 A19,19 0 1,0 -8,-25" fill="#f8f8f6" opacity="0.9"/>
    <polygon points="18,-18 20,-13 25,-13 21,-10 23,-5 18,-8 13,-5 15,-10 11,-13 16,-13" fill="#f8f8f6" opacity="0.7"/>
  </g>

  <!-- Decorative divider line -->
  <line x1="90" y1="18" x2="90" y2="72" stroke="#f8f8f6" stroke-width="1" opacity="0.2"/>

  <!-- Main copy -->
  <text x="110" y="38" font-family="'Bricolage Grotesque', sans-serif" font-size="22" font-weight="700" fill="#f8f8f6" letter-spacing="-0.3">Compassionate Patient Care This Ramadan</text>
  <text x="110" y="60" font-family="'Geist', sans-serif" font-size="14" fill="#f8f8f6" opacity="0.75">AI-powered scheduling, reminders, and engagement that respects cultural needs.</text>

  <!-- CTA Button -->
  <rect x="575" y="22" width="135" height="46" rx="23" fill="#f8f8f6"/>
  <text x="642" y="51" text-anchor="middle" font-family="'Geist', sans-serif" font-size="15" font-weight="700" fill="#006828" letter-spacing="0.5">Book a Demo</text>

  <!-- Zavis wordmark bottom-right area -->
  <text x="110" y="78" font-family="'Bricolage Grotesque', sans-serif" font-size="12" font-weight="700" fill="#f8f8f6" opacity="0.5" letter-spacing="3">ZAVIS</text>

  <!-- Border -->
  <rect width="728" height="90" fill="none" stroke="#004018" stroke-width="1" rx="4"/>
</svg>